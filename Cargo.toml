[package]
name = "kymetica"
version = "0.1.0"
edition = "2024"

[features]
default = []
build-helpers = ["dep:cranelift-isle"]

[build-dependencies]
cranelift-isle = { version = "0.128.1", features = [
    "fancy-errors",
    "log",
    "logging",
] }

[dependencies]
bimap = "0.6.3"
cranelift-isle = { version = "0.128.1", features = [
    "fancy-errors",
    "log",
    "logging",
], optional = true }
egg = { git = "https://github.com/sarahmorin/egg.git", branch = "main" }
indexmap = "2.13.0"
log = "0.4.29"

[dev-dependencies]
env_logger = "0.11"

[[example]]
name = "database_optimizer"
path = "examples/database_optimizer/main.rs"

# HACK: Use a local path dependency for egg during development to avoid git overhead and allow for easy code changes
# [patch.crates-io]
# egg = { path = "../egg" }
